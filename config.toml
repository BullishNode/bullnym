domain = "localhost:8080"
listen = "0.0.0.0:8080"
pool_size = 5

[boltz]
api_url = "https://api.boltz.exchange/v2"
electrum_url = "les.bullbitcoin.com:995"

[features]
lightning_address = true
invoices = true
payment_pages = true

[limits]
# Match prod so simulator's amount=100000 msat works.
min_sendable_msat = 100000
max_sendable_msat = 25000000000

[electrum]
# Bull's own Liquid Electrum — has been more reliable than Blockstream's.
liquid_url = "les.bullbitcoin.com:995"

[workers]
enabled = true

[proof]
# LUD-22 proof-of-funds floor. ENFORCED: the callback unblinds the payer's
# confidential proof UTXO (with the supplied blinding key) and rejects it
# unless the asset is L-BTC and its value is at least this many sats. The
# recovered asset is rebound to the on-chain asset generator, so a UTXO that
# commits to another asset while claiming L-BTC in its rangeproof message is
# rejected. Only confidential outputs qualify: explicit-value/explicit-asset
# (non-confidential) outputs are rejected by design.
min_proof_value_sat = 1000

[rate_limit]
# High limits so the simulator suite can run repeatedly without budget concerns.
per_ip_limit = 1000
per_ip_window_secs = 60
# LUD-22 anti-enumeration gates. The primary binding gates are the per-outpoint
# fan-out cap (distinct_nyms_per_outpoint, 3 nyms/UTXO/hour in code) and per-IP
# above. per_pubkey is a secondary, defense-in-depth gate; this simulator value
# is intentionally high — tighten it in production to bound per-key volume.
per_pubkey_limit = 1000
per_pubkey_window_secs = 3600
max_pending_reservations_per_nym = 5000
lightning_rate_per_minute = 1000
global_electrum_rate_per_sec = 200
invoice_status_per_source_per_min = 1000
trust_forwarded_for = false

# --- Registration gates ---
# These close R8 (registration flood). Aggressive on purpose; legitimate users
# register once per identity so 5/min/IP is generous. Per-IP-distinct-npubs
# blocks slow-drip multi-identity creation. The ceiling is the operational
# guardrail; raise once we see real signup traffic approach it.
register_rate_limit                           = 5
register_rate_window_secs                     = 60
register_distinct_npubs_per_ip_limit          = 10
register_distinct_npubs_per_ip_window_secs    = 3600
max_active_users                              = 100000

# --- Metadata + lookup gates ---
# Closes R-enum (full nym-list discovery via /.well-known endpoints).
# 30/min/IP is plenty for legitimate paying clients (which fetch metadata
# once per payment, plus an occasional NIP-05 verification). The distinct-
# nyms cap throttles slow-drip enumeration.
metadata_rate_limit                           = 30
metadata_rate_window_secs                     = 60
metadata_distinct_nyms_per_ip_limit           = 20
metadata_distinct_nyms_per_ip_window_secs     = 3600
lookup_distinct_npubs_per_ip_limit            = 20
lookup_distinct_npubs_per_ip_window_secs      = 3600

# --- Chain watcher ---
# Dedicated Electrum bucket so a callback storm can't starve the watcher
# (and vice-versa). Active users (recent /lnurlp/callback) get the fast
# tick; idle users get scanned every 10 min. With 100k+ registered
# users this keeps per-tick Electrum cost bounded by real traffic, not
# by table size.
chain_watcher_electrum_rate_per_sec           = 50
chain_watcher_active_user_tick_secs           = 30
chain_watcher_idle_user_tick_secs             = 600
chain_watcher_active_window_secs              = 86400
